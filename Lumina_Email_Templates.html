// ── RENDER ENGINE ──
function createCard(email) {
  const isAbandonment = email.type === 'abandonment';
  const cardId = `card-${email.code}`;
  const previewId = `preview-${email.code}`;

  return `
    <div class="email-card" id="${cardId}">
      <div class="card-header ${email.type}">
        <div>
          <div class="card-tag">${isAbandonment ? 'Cart Abandonment' : 'Welcome Series'}</div>
          <div style="font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:white;margin-top:4px;">${email.code}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;color:rgba(255,255,255,0.9);">${email.name}</div>
          <div class="card-timing">${email.timing}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-subject">Subject: <span>${email.subject}</span></div>
        <div class="card-subject" style="margin-top:4px;">Preview: <span style="color:#7A6A6A;font-weight:400;">${email.preview}</span></div>
        <span class="preview-toggle" onclick="togglePreview('${previewId}')">▾ Preview email</span>
        <div class="email-preview" id="${previewId}">
          <div class="preview-label">Email Preview</div>
          ${email.html}
        </div>
      </div>
    </div>`;
}

function renderGrids() {
  const all = document.getElementById('grid-all');
  const abandonment = document.getElementById('grid-abandonment');
  const welcome = document.getElementById('grid-welcome');

  emails.forEach(email => {
    const card = createCard(email);
    all.innerHTML += card;
    if (email.type === 'abandonment') abandonment.innerHTML += card;
    else welcome.innerHTML += card;
  });
}

function togglePreview(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
  const toggle = el.previousElementSibling.querySelector('.preview-toggle');
  if (toggle) toggle.textContent = el.classList.contains('open') ? '▴ Hide preview' : '▾ Preview email';
}
